# ─────────────────────────────────────────────────────────────
# Cautious Giggle — HFT Scalping Configuration
# High-frequency M1 scalping mode. Inspired by the viral $50→$3M
# strategy: many small trades, tight risk, fast decisions.
# ─────────────────────────────────────────────────────────────
trading:
  symbols:
  - BTCUSDm
  - XAUUSDm
  timeframe: M1
  risk_percent: 2.0
  max_drawdown: 18.0
  confidence_threshold: 0.55
  magic_number: 506
  # Per-symbol aggressive profiles
  symbol_profiles:
    BTCUSDm:
      magic_base: 61000
      ppo_weight: 0.75
      dreamer_weight: 0.20
      agi_context_weight: 0.05
      min_actionable_exposure: 0.12
      max_policy_exposure: 1.10
      min_trade_interval_sec: 30
      rebalance_min_delta_exposure: 0.30
      memory_min_trades: 10
      memory_penalty_scale: 0.50
      memory_profit_factor_floor: 0.95
      memory_expectancy_floor: -0.05
      memory_max_recent_loss_streak: 3
      sl_atr_multiplier: 1.0
      breakeven_atr_divisor: 5
      signal_collapse_exit: true
      signal_collapse_cycles: 3
      regime_flip_exit_losing: true
      min_hold_time_sec: 180
      trailing_widen_factor: 1.3
      partial_tp_enabled: true
      partial_tp_fraction: 0.5
      ignore_small_reduction: true
      ignore_reduction_threshold: 0.30
      pyramid_enabled: true
      pyramid_max_layers: 2
      pyramid_min_profit_points: 30
      pyramid_signal_increase: 0.10
      pyramid_atr_spike_limit: 1.5
      pyramid_volume_decay: 0.5
      pyramid_min_time_between_sec: 60
    XAUUSDm:
      magic_base: 62000
      ppo_weight: 0.70
      dreamer_weight: 0.20
      agi_context_weight: 0.10
      min_actionable_exposure: 0.10
      max_policy_exposure: 0.90
      min_trade_interval_sec: 30
      rebalance_min_delta_exposure: 0.25
      memory_min_trades: 10
      memory_penalty_scale: 0.45
      memory_profit_factor_floor: 1.00
      memory_expectancy_floor: 0.00
      memory_max_recent_loss_streak: 2
      sl_atr_multiplier: 1.1
      breakeven_atr_divisor: 5
      signal_collapse_exit: true
      signal_collapse_cycles: 3
      regime_flip_exit_losing: true
      min_hold_time_sec: 180
      trailing_widen_factor: 1.3
      partial_tp_enabled: true
      partial_tp_fraction: 0.5
      ignore_small_reduction: true
      ignore_reduction_threshold: 0.30
      pyramid_enabled: true
      pyramid_max_layers: 1
      pyramid_min_profit_points: 50
      pyramid_signal_increase: 0.12
      pyramid_atr_spike_limit: 1.5
      pyramid_volume_decay: 0.5
      pyramid_min_time_between_sec: 90

risk:
  max_daily_loss: 200.0
  max_daily_trades: 100
  max_daily_trades_per_symbol: 50
  max_daily_losing_trades_per_symbol: 15
  max_lots: 0.1
  supervisor:
    enabled: true
    max_daily_loss: 200.0
    max_drawdown_pct: 10.0
    max_symbol_exposure: 0.50
    max_total_exposure: 1.0
    max_open_positions: 6
    max_positions_per_symbol: 3
    min_trade_interval_sec: 20
    max_spread_bps: 15.0

telegram:
  token: ENV:TELEGRAM_TOKEN
  chat_id: ENV:TELEGRAM_CHAT_ID

event_intel:
  enabled: true
  poll_sec: 30
  pre_event_min: 15
  post_event_min: 10
  news_hold_min: 5
  max_events: 200

drl:
  total_timesteps: 200000
  per_symbol: true
  period: 30d
  interval: M1
  candles_per_symbol: 25000
  eval_period: 30d
  model_path: models/hft/ppo_trading.zip
  feature_version: ultimate_150
  data_source: mt5
  optuna_trials: 0
  optuna_timesteps: 10000
  dreamer:
    enabled: true
    train_in_cycle: true
    steps: 3000
    window: 32
    feature_version: ultimate_150
    symbols:
    - BTCUSDm
    - XAUUSDm
  ensemble:
    enabled: false
    min_votes: 2
    agreement_threshold: 0.5
  symbol_overrides:
    BTCUSDm:
      action:
        min_direction_abs: 0.01
        min_size_abs: 0.01
        min_target_abs: 0.01
    XAUUSDm:
      action:
        min_direction_abs: 0.01
        min_size_abs: 0.01
        min_target_abs: 0.01
  reward:
    version: v2_risk_adjusted
    weights:
      growth: 12.0
      payoff: 4.0
      sharpe_bonus: 2.0
      drawdown_penalty: 2.0
      cost_penalty: 3.0
      churn_penalty: 0.1
      memory_expectancy_bonus: 1.0
      loss_streak_penalty: 0.2

training:
  lstm_epochs: 15
  per_symbol: true
  lstm_period: 30d
  lstm_interval: M1
  lstm_candles: 25000
  feature_version: ultimate_150
  data_source: mt5

evaluation:
  max_drawdown: 18.0
  min_sharpe: -0.8
  min_return: -0.20
  score_margin: 0.03
  min_steps_per_symbol: 300
  min_pass_rate: 0.4
  return_margin: 0.0
  sharpe_margin: 0.0
  drawdown_margin: 0.0
  forward_windows:
  - 15d
  - 30d
  min_forward_win_rate: 0.34

registry:
  ensemble:
    history_limit: 5
  canary_policy:
    default:
      min_trades: 50
      min_realized_pnl: -50.0
      max_drawdown: 18.0
      min_runtime_minutes: 30
    per_symbol:
      BTCUSDm:
        max_drawdown: 18.0
        min_trades: 80

data:
  source: mt5

cycle:
  skip_completed_training: false
  parallel_symbols: true
  max_parallel_symbols: 1

mt5:
  login: ENV:MT5_LOGIN
  password: ENV:MT5_PASSWORD
  server: ENV:MT5_SERVER
