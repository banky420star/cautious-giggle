trading:
  symbols:
  - BTCUSDm
  - XAUUSDm
  timeframe: M30
  risk_percent: 2.0
  max_drawdown: 18.0
  confidence_threshold: 0.85
  magic_number: 505
  symbol_profiles:
    BTCUSDm:
      ppo_weight: 0.65
      dreamer_weight: 0.25
      agi_context_weight: 0.10
      min_actionable_exposure: 0.10
      max_policy_exposure: 0.75
      rebalance_min_delta_exposure: 0.12
      memory_min_trades: 8
      memory_penalty_scale: 0.45
      memory_profit_factor_floor: 0.95
      memory_expectancy_floor: -0.10
      memory_max_recent_loss_streak: 3
    XAUUSDm:
      ppo_weight: 0.50
      dreamer_weight: 0.20
      agi_context_weight: 0.30
      min_actionable_exposure: 0.12
      max_policy_exposure: 0.45
      rebalance_min_delta_exposure: 0.10
      memory_min_trades: 8
      memory_penalty_scale: 0.35
      memory_profit_factor_floor: 1.00
      memory_expectancy_floor: 0.00
      memory_max_recent_loss_streak: 2
risk:
  max_daily_loss: 100000.0
  max_daily_trades: 10000
  max_daily_trades_per_symbol: 5000
  max_daily_losing_trades_per_symbol: 10
  max_lots: 0.1
  supervisor:
    enabled: false
    max_daily_loss: 100000.0
    max_drawdown_pct: 8.0
    max_symbol_exposure: 0.35
    max_total_exposure: 1.2
    max_open_positions: 6
    max_positions_per_symbol: 3
    min_trade_interval_sec: 45
    max_spread_bps: 25.0
telegram:
  token: ENV:TELEGRAM_TOKEN
  chat_id: ENV:TELEGRAM_CHAT_ID
event_intel:
  enabled: true
  poll_sec: 60
  pre_event_min: 60
  post_event_min: 30
  news_hold_min: 20
  max_events: 200
drl:
  total_timesteps: 500000
  per_symbol: true
  period: 90d
  interval: M30
  candles_per_symbol: 50000
  eval_period: 90d
  model_path: models/ppo_trading.zip
  feature_version: ultimate_150
  data_source: mt5
  optuna_trials: 0
  optuna_timesteps: 10000
  dreamer:
    enabled: true
    train_in_cycle: true
    steps: 5000
    window: 64
    feature_version: ultimate_150
    symbols:
    - BTCUSDm
    - XAUUSDm
  ensemble:
    enabled: false
    min_votes: 2
    agreement_threshold: 0.5
  symbol_overrides:
    BTCUSDm:
      action:
        min_direction_abs: 0.04
        min_size_abs: 0.04
        min_target_abs: 0.04
    XAUUSDm:
      action:
        min_direction_abs: 0.03
        min_size_abs: 0.03
        min_target_abs: 0.03
  reward:
    version: v2_risk_adjusted
    weights:
      growth: 8.0
      payoff: 2.0
      sharpe_bonus: 1.0
      drawdown_penalty: 3.0
      cost_penalty: 2.0
      churn_penalty: 0.5
      memory_expectancy_bonus: 0.5
      loss_streak_penalty: 0.4
training:
  lstm_epochs: 20
  per_symbol: true
  lstm_period: 90d
  lstm_interval: M30
  lstm_candles: 25000
  feature_version: ultimate_150
  data_source: mt5
evaluation:
  max_drawdown: 18.0
  min_sharpe: -0.5
  min_return: -0.25
  score_margin: 0.05
  min_steps_per_symbol: 600
  min_pass_rate: 0.5
  return_margin: 0.0
  sharpe_margin: 0.0
  drawdown_margin: 0.0
  forward_windows:
  - 60d
  - 90d
  - 120d
  min_forward_win_rate: 0.34
registry:
  ensemble:
    history_limit: 3
  canary_policy:
    default:
      min_trades: 30
      min_realized_pnl: 0.0
      max_drawdown: 18.0
      min_runtime_minutes: 45
    per_symbol:
      BTCUSDm:
        max_drawdown: 18.0
        min_trades: 60
data:
  source: mt5
cycle:
  skip_completed_training: false
  parallel_symbols: true
  max_parallel_symbols: 1
mt5:
  login: ENV:MT5_LOGIN
  password: ENV:MT5_PASSWORD
  server: ENV:MT5_SERVER
